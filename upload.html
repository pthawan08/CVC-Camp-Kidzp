<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อัปโหลดสลิปค่ายเด็กประถม</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
      body { font-family: 'Sarabun', sans-serif; background-color: #f0f9ff; }
  </style>
</head>
<body class="bg-gray-50 flex flex-col items-center p-4 text-gray-800 min-h-screen justify-center">
  <div class="w-full max-w-md bg-white rounded-3xl shadow-lg p-6 border-t-8 border-green-500">
    <div class="flex flex-col items-center mb-6">
      <div class="bg-green-100 text-green-600 p-4 rounded-full mb-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" /></svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">อัปโหลดสลิปโอนเงิน</h1>
    </div>

    <div class="bg-green-50 p-4 rounded-xl border border-green-100 mb-6 text-sm text-gray-600 flex items-start gap-2">
       <span>📍</span>
       <p>กรุณาเลือกรูปภาพสลิปที่ต้องการอัปโหลด เพื่อให้ทีมงานตรวจสอบความถูกต้องค่ะ</p>
    </div>

    <label for="fileInput" class="flex flex-col items-center justify-center w-full p-4 border-2 border-dashed border-green-300 rounded-2xl cursor-pointer hover:bg-green-50 transition mb-4">
        <span id="fileName" class="text-green-600 font-semibold text-center">📸 กดตรงนี้เพื่อเลือกรูปสลิป</span>
        <input type="file" id="fileInput" accept="image/jpeg, image/png" class="hidden" />
    </label>

    <div id="previewContainer" class="hidden mb-6 bg-gray-50 p-2 rounded-2xl border border-gray-200">
      <img id="imagePreview" src="" class="max-w-full h-auto rounded-xl mx-auto max-h-64 object-contain" />
    </div>

    <button id="uploadBtn" disabled class="w-full bg-gray-300 text-gray-500 font-bold py-4 rounded-2xl text-lg transition duration-300 shadow-sm flex justify-center items-center gap-2">
        📤 ส่งสลิปโอนเงิน
    </button>
  </div>

  <script>
    // =====================================
    // ⚙️ ตรวจสอบลิงก์ GAS ตรงนี้ให้ตรงกับเวอร์ชั่นล่าสุดของคุณ
    // =====================================
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzgenzmHqRKakKQWIrrsIjXb-0BK0EutIEhk2nuPGKcuzW8dOwRzV7ENnXizObHvZ9E/exec';
    const MY_LIFF_ID = '2010169999-c4njRWv3'; 
    
    let currentUserId = "";
    let compressedBase64 = ""; // ตัวแปรเก็บรูปที่ย่อขนาดแล้ว

    // ดึง LINE ID อัตโนมัติ
    document.addEventListener("DOMContentLoaded", function() {
        liff.init({ liffId: MY_LIFF_ID }).then(() => {
            if (liff.isLoggedIn()) {
                liff.getProfile().then(profile => {
                    currentUserId = profile.userId;
                });
            } else { liff.login(); }
        }).catch(err => console.error(err));
    });

    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');
    const uploadBtn = document.getElementById('uploadBtn');
    const previewContainer = document.getElementById('previewContainer');
    const imagePreview = document.getElementById('imagePreview');

    fileInput.addEventListener('change', function(e) {
      if (e.target.files.length > 0) {
        const file = e.target.files[0];
        fileNameDisplay.innerText = "✅ เลือกไฟล์: " + file.name;
        fileNameDisplay.classList.replace('text-green-600', 'text-gray-700');
        
        const reader = new FileReader();
        reader.onload = (event) => {
            // 🌟 กระบวนการย่อขนาดรูปภาพก่อนส่ง (บีบอัดให้ไม่เกิน 800px)
            const img = new Image();
            img.onload = () => {
                imagePreview.src = img.src;
                previewContainer.classList.remove('hidden'); 
                
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 800;
                const MAX_HEIGHT = 800;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                  if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                  }
                } else {
                  if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                  }
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // แปลงภาพที่ย่อแล้วเป็น Base64
                compressedBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                
                uploadBtn.disabled = false;
                uploadBtn.className = "w-full bg-green-600 text-white font-bold py-4 rounded-2xl text-lg hover:bg-green-700 transition duration-300 shadow-md flex justify-center items-center gap-2";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    uploadBtn.addEventListener('click', function() {
      if (!compressedBase64) return;

      if (!currentUserId) {
          Swal.fire('ข้อผิดพลาด', 'ไม่พบข้อมูล LINE ID กรุณารอสักครู่แล้วกดใหม่ค่ะ', 'error');
          return;
      }

      uploadBtn.disabled = true;
      uploadBtn.innerHTML = "⏳ กำลังอัปโหลดสลิป...";
      uploadBtn.className = "w-full bg-yellow-500 text-white font-bold py-4 rounded-2xl text-lg transition duration-300 shadow-md flex justify-center items-center gap-2";

      // ส่งข้อมูลรูปภาพที่ย่อขนาดแล้ว
      fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify({
          image: compressedBase64,
          userId: currentUserId
        })
      }).then(() => {
        Swal.fire({
            icon: 'success',
            title: 'ส่งสลิปสำเร็จ!',
            text: 'รอแอดมินตรวจสอบสักครู่นะคะ',
            confirmButtonColor: '#16a34a',
            confirmButtonText: 'รับทราบ (ปิดหน้าต่าง)'
        }).then(() => {
            liff.closeWindow(); 
        });
      }).catch(() => {
        Swal.fire('เกิดข้อผิดพลาด', 'สัญญาณเน็ตอาจขัดข้อง โปรดลองใหม่อีกครั้ง', 'error');
        uploadBtn.innerHTML = "📤 ส่งสลิปโอนเงิน";
        uploadBtn.className = "w-full bg-green-600 text-white font-bold py-4 rounded-2xl text-lg hover:bg-green-700 transition duration-300 shadow-md flex justify-center items-center gap-2";
        uploadBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
